<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      /* ── Primary (blue) ───────────────────────────────────────────── */
      --blue-50:  hsl(217, 91%, 95%);
      --blue-100: hsl(217, 86%, 89%);
      --blue-200: hsl(217, 80%, 79%);
      --blue-500: hsl(217, 91%, 60%);
      --blue-600: hsl(217, 91%, 50%);
      --blue-700: hsl(217, 80%, 40%);
      --blue-900: hsl(217, 70%, 20%);

      /* ── Success (green) ──────────────────────────────────────────── */
      --green-50:  hsl(142, 76%, 95%);
      --green-100: hsl(142, 72%, 86%);
      --green-500: hsl(142, 71%, 45%);
      --green-600: hsl(142, 71%, 37%);
      --green-700: hsl(142, 64%, 28%);

      /* ── Warning (amber) ──────────────────────────────────────────── */
      --amber-50:  hsl(38, 92%, 95%);
      --amber-100: hsl(38, 92%, 87%);
      --amber-500: hsl(38, 92%, 50%);
      --amber-600: hsl(38, 86%, 41%);
      --amber-700: hsl(38, 80%, 30%);

      /* ── Danger (red) ─────────────────────────────────────────────── */
      --red-50:  hsl(0, 86%, 95%);
      --red-100: hsl(0, 86%, 89%);
      --red-500: hsl(0, 84%, 60%);
      --red-600: hsl(0, 84%, 50%);
      --red-700: hsl(0, 74%, 40%);

      /* ── Info (teal) ──────────────────────────────────────────────── */
      --teal-50:  hsl(199, 89%, 95%);
      --teal-100: hsl(199, 85%, 86%);
      --teal-500: hsl(199, 89%, 48%);
      --teal-600: hsl(199, 89%, 38%);
      --teal-700: hsl(199, 78%, 28%);

      /* ── Cool greys (complement to blue primary) ──────────────────── */
      --grey-50:  hsl(220, 20%, 98%);
      --grey-100: hsl(220, 15%, 96%);
      --grey-200: hsl(220, 13%, 91%);
      --grey-300: hsl(220, 11%, 83%);
      --grey-500: hsl(220, 9%,  46%);
      --grey-700: hsl(220, 13%, 26%);
      --grey-900: hsl(220, 26%, 14%);

      /* ── Semantic aliases ─────────────────────────────────────────── */
      --color-primary:       var(--blue-500);
      --color-primary-bg:    var(--blue-50);
      --color-primary-text:  var(--blue-900);
      --color-primary-border:var(--blue-500);

      --color-success:       var(--green-500);
      --color-success-bg:    var(--green-50);
      --color-success-text:  var(--green-700);
      --color-success-border:var(--green-500);

      --color-warning:       var(--amber-500);
      --color-warning-bg:    var(--amber-50);
      --color-warning-text:  var(--amber-700);
      --color-warning-border:var(--amber-500);

      --color-danger:        var(--red-500);
      --color-danger-bg:     var(--red-50);
      --color-danger-text:   var(--red-700);
      --color-danger-border: var(--red-500);

      --color-info:          var(--teal-500);
      --color-info-bg:       var(--teal-50);
      --color-info-text:     var(--teal-700);
      --color-info-border:   var(--teal-500);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 32px;
      background: var(--grey-50);
      color: var(--grey-900);
      line-height: 1.5;
    }

    /* ── Badges ────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
      border-radius: 9999px;
      margin: 4px;
    }

    .badge-primary { background: var(--blue-100);  color: var(--blue-700);  }
    .badge-success { background: var(--green-100); color: var(--green-700); }
    .badge-warning { background: var(--amber-100); color: var(--amber-700); }
    .badge-danger  { background: var(--red-100);   color: var(--red-700);   }
    .badge-info    { background: var(--teal-100);  color: var(--teal-700);  }

    /* ── Alerts ────────────────────────────────────────────────────── */
    .section { margin-top: 24px; }

    .alert {
      padding: 12px 16px;
      margin: 8px 0;
      border-left: 4px solid;
      border-radius: 0 6px 6px 0;
      font-size: 14px;
    }

    .alert-primary {
      background: var(--color-primary-bg);
      border-color: var(--color-primary-border);
      color: var(--color-primary-text);
    }
    .alert-success {
      background: var(--color-success-bg);
      border-color: var(--color-success-border);
      color: var(--color-success-text);
    }
    .alert-danger {
      background: var(--color-danger-bg);
      border-color: var(--color-danger-border);
      color: var(--color-danger-text);
    }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .button-row {
      margin-top: 24px;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-primary { background: var(--blue-500);  color: hsl(0, 0%, 100%); }
    .btn-primary:hover { background: var(--blue-600); }

    .btn-success { background: var(--green-500); color: hsl(0, 0%, 100%); }
    .btn-success:hover { background: var(--green-600); }

    .btn-danger  { background: var(--red-500);   color: hsl(0, 0%, 100%); }
    .btn-danger:hover  { background: var(--red-600);  }
  </style>
</head>
<body>
  <div>
    <span class="badge badge-primary">Primary</span>
    <span class="badge badge-success">Success</span>
    <span class="badge badge-warning">Warning</span>
    <span class="badge badge-danger">Danger</span>
    <span class="badge badge-info">Info</span>
  </div>
  <div class="section">
    <div class="alert alert-primary">This is a primary alert message for your attention.</div>
    <div class="alert alert-success">Success! Your changes have been saved.</div>
    <div class="alert alert-danger">Error: something went terribly wrong in the system.</div>
  </div>
  <div class="button-row">
    <button class="btn btn-primary">Continue</button>
    <button class="btn btn-success">Confirm</button>
    <button class="btn btn-danger">Delete</button>
  </div>
</body>
</html>
