<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    /* ─── Color Palette (HSL) ─── */
    :root {
      /* Cool greys — slight blue hue for a modern, technical feel */
      --grey-50:  hsl(220, 30%, 98%);
      --grey-100: hsl(220, 20%, 95%);
      --grey-200: hsl(220, 16%, 90%);
      --grey-300: hsl(220, 13%, 82%);
      --grey-400: hsl(220, 10%, 65%);
      --grey-500: hsl(220, 9%,  46%);
      --grey-700: hsl(220, 13%, 30%);
      --grey-900: hsl(220, 26%, 10%);

      /* Primary blue — 9-shade scale */
      --blue-50:  hsl(217, 91%, 95%);
      --blue-100: hsl(217, 88%, 88%);
      --blue-200: hsl(217, 85%, 78%);
      --blue-500: hsl(217, 91%, 55%);
      --blue-600: hsl(217, 85%, 47%);
      --blue-700: hsl(217, 80%, 38%);

      /* Danger/error red */
      --red-50:   hsl(0, 86%, 97%);
      --red-200:  hsl(0, 70%, 82%);
      --red-600:  hsl(0, 72%, 48%);
      --red-700:  hsl(0, 70%, 40%);

      /* Shadows */
      --shadow-sm: 0 1px 2px hsl(220, 13%, 10%, 0.06);
      --shadow-md: 0 1px 3px hsl(220, 13%, 10%, 0.08),
                   0 6px 24px hsl(220, 13%, 10%, 0.06);
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 48px 20px;
      min-height: 100vh;
      background: var(--grey-50);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--grey-900);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Card ─── */
    .form-container {
      background: white;
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    /* ─── Heading — primary hierarchy ─── */
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--grey-900);
      letter-spacing: -0.015em;
      line-height: 1.2;
      margin: 0 0 28px;
    }

    /* ─── Form group — controls label/input grouping ─── */
    .form-group {
      margin-bottom: 20px;
    }

    /* ─── Labels — secondary hierarchy ─── */
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--grey-700);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    /* ─── Inputs ─── */
    input {
      display: block;
      width: 100%;
      font-size: 16px;
      font-family: inherit;
      color: var(--grey-900);
      background: white;
      border: 1.5px solid var(--grey-300);
      border-radius: 8px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input::placeholder {
      color: var(--grey-400);
    }

    input:focus {
      border-color: var(--blue-500);
      box-shadow: 0 0 0 3px var(--blue-50);
    }

    /* Error state on input */
    input.has-error {
      border-color: var(--red-200);
      background: var(--red-50);
    }

    input.has-error:focus {
      border-color: var(--red-600);
      box-shadow: 0 0 0 3px var(--red-50);
    }

    /* ─── Error message — lighter color, NOT opacity hack ─── */
    .error {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--red-600);
    }

    /* ─── Helper text — muted via lighter color value, not opacity ─── */
    .helper {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      font-weight: 400;
      color: var(--grey-400);
      line-height: 1.5;
    }

    /* ─── Primary button ─── */
    button {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      color: white;
      background: var(--blue-500);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease, box-shadow 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    button:hover {
      background: var(--blue-600);
      box-shadow: 0 2px 8px hsl(217, 91%, 55%, 0.35);
    }

    button:active {
      background: var(--blue-700);
      box-shadow: none;
    }

    /* ─── Footer actions — tertiary hierarchy ─── */
    .footer-actions {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-actions span,
    .footer-actions a {
      font-size: 14px;
    }

    .footer-actions span {
      color: var(--grey-500);
    }

    a {
      color: var(--blue-600);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      color: var(--blue-700);
      text-decoration: underline;
    }

    .footer-actions .forgot-link {
      color: var(--grey-500);
      font-weight: 400;
    }

    .footer-actions .forgot-link:hover {
      color: var(--grey-700);
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Log in to your account</h1>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" class="has-error" aria-describedby="email-error">
      <span id="email-error" class="error">Email is required</span>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" aria-describedby="password-hint">
      <span id="password-hint" class="helper">Must be at least 8 characters</span>
    </div>

    <button type="submit">Log in</button>

    <div class="footer-actions">
      <a href="#" class="forgot-link">Forgot your password?</a>
      <span>Don't have an account? <a href="#">Sign up</a></span>
    </div>
  </div>
</body>
</html>
