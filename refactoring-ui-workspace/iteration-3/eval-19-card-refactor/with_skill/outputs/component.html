<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px;
      background: hsl(220, 20%, 97%);
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.06);
      width: 320px;
      overflow: hidden;
      border-top: 4px solid hsl(220, 90%, 56%);
    }

    .card-inner {
      padding: 20px 24px 24px;
    }

    .card-header h2 {
      font-size: 15px;
      color: hsl(220, 25%, 15%);
      font-weight: 600;
      margin: 0 0 12px;
    }

    .card-body p {
      font-size: 14px;
      color: hsl(220, 10%, 50%);
      line-height: 1.65;
      margin: 0;
    }

    .card-author {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    .avatar {
      width: 30px;
      height: 30px;
      background: hsl(220, 20%, 83%);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .author-name {
      font-size: 13px;
      color: hsl(220, 10%, 55%);
    }

    .card-meta {
      display: flex;
      gap: 6px;
      margin-top: 14px;
    }

    .card-meta span {
      font-size: 12px;
      color: hsl(220, 35%, 45%);
      background: hsl(220, 35%, 95%);
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 500;
    }

    .card-footer {
      padding: 14px 24px;
      background: hsl(220, 20%, 98%);
    }

    .card-footer button {
      background: hsl(220, 90%, 56%);
      color: white;
      border: none;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.01em;
    }

    .card-footer button:hover {
      background: hsl(220, 90%, 50%);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-inner">
      <div class="card-header">
        <h2>Project Update</h2>
      </div>
      <div class="card-body">
        <p>The migration is complete. All services are running normally and performance metrics are within expected ranges. Monitoring will continue for the next 48 hours.</p>
      </div>
      <div class="card-author">
        <div class="avatar"></div>
        <span class="author-name">Sarah Chen · 2 hours ago</span>
      </div>
      <div class="card-meta">
        <span>infrastructure</span><span>ops</span>
      </div>
    </div>
    <div class="card-footer">
      <button>View Details</button>
    </div>
  </div>
</body>
</html>
