<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; padding: 40px; background: #f5f5f7; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 20px; width: 320px; }
    .card-header h2 { font-size: 15px; color: #111; font-weight: 600; margin: 0 0 12px; }
    .card-body p { font-size: 14px; color: #555; line-height: 1.6; margin: 0 0 16px; }
    .card-author { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .avatar { width: 26px; height: 26px; background: #d1d5db; border-radius: 50%; }
    .author-name { font-size: 13px; color: #888; }
    .card-meta { display: flex; gap: 6px; margin-bottom: 16px; }
    .card-meta span { font-size: 12px; color: #6366f1; background: #eef2ff; padding: 3px 8px; border-radius: 20px; }
    .card-footer button { background: #111; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; width: 100%; cursor: pointer; font-weight: 500; }
    .card-footer button:hover { background: #333; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header"><h2>Project Update</h2></div>
    <div class="card-body">
      <p>The migration is complete. All services are running normally and performance metrics are within expected ranges. Monitoring will continue for the next 48 hours.</p>
    </div>
    <div class="card-author">
      <div class="avatar"></div>
      <span class="author-name">Sarah Chen · 2 hours ago</span>
    </div>
    <div class="card-meta">
      <span>infrastructure</span><span>ops</span>
    </div>
    <div class="card-footer"><button>View Details</button></div>
  </div>
</body>
</html>
