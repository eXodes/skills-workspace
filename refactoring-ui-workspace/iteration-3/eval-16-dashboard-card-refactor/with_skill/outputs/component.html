<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px;
      background: hsl(220, 20%, 97%);
    }

    .card {
      background: hsl(0, 0%, 100%);
      border-radius: 8px;
      border-top: 3px solid hsl(217, 91%, 55%);
      box-shadow:
        0 1px 3px hsla(220, 20%, 10%, 0.08),
        0 4px 12px hsla(220, 20%, 10%, 0.05);
      padding: 24px;
      width: 220px;
    }

    /* Tertiary — label, all-caps, muted */
    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: hsl(220, 10%, 50%);
      margin-bottom: 12px;
    }

    /* Primary — dominant stat value */
    .card-value {
      font-size: 32px;
      font-weight: 700;
      color: hsl(220, 20%, 15%);
      line-height: 1;
      margin-bottom: 8px;
    }

    /* Secondary — positive change indicator */
    .card-change {
      font-size: 13px;
      font-weight: 600;
      color: hsl(142, 60%, 35%);
      margin-bottom: 2px;
    }

    /* Tertiary — supporting meta text */
    .card-meta {
      font-size: 12px;
      color: hsl(220, 10%, 65%);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-title">Total Revenue</div>
    <div class="card-value">$48,295</div>
    <div class="card-change">↑ 12.5%</div>
    <div class="card-meta">vs last month</div>
  </div>
</body>
</html>
