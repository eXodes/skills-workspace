<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; padding: 20px; background: white; }
    .card {
      background: linear-gradient(135deg, #FF5733, #FFC300, #28B463);
      border: 3px solid #8E44AD;
      padding: 10px;
      width: 200px;
    }
    .card-title { font-size: 14px; color: #000000; font-weight: 400; text-transform: uppercase; border-bottom: 2px solid #000; margin-bottom: 4px; padding-bottom: 4px; }
    .card-value { font-size: 14px; color: #000000; font-weight: 400; }
    .card-change { font-size: 14px; color: #FF0000; font-weight: 400; }
    .card-meta { font-size: 14px; color: #000000; opacity: 0.4; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-title">Total Revenue</div>
    <div class="card-value">$48,295</div>
    <div class="card-change">↑ 12.5%</div>
    <div class="card-meta">vs last month</div>
  </div>
</body>
</html>
