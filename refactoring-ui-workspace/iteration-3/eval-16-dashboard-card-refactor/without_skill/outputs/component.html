<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 40px;
      background: #F3F4F6;
    }
    .card {
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      padding: 24px;
      width: 220px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }
    .card-title {
      font-size: 11px;
      color: #6B7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .card-value {
      font-size: 28px;
      color: #111827;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .card-change {
      font-size: 13px;
      color: #059669;
      font-weight: 600;
    }
    .card-meta {
      font-size: 12px;
      color: #9CA3AF;
      font-weight: 400;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-title">Total Revenue</div>
    <div class="card-value">$48,295</div>
    <div class="card-change">↑ 12.5%</div>
    <div class="card-meta">vs last month</div>
  </div>
</body>
</html>
