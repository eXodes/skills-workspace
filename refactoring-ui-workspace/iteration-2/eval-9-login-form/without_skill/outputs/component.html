<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .card-header {
      margin-bottom: 32px;
    }

    .card-header h1 {
      font-size: 1.625rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 0.9rem;
      color: #6b7280;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      display: block;
      width: 100%;
      padding: 10px 14px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: #111827;
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input::placeholder {
      color: #9ca3af;
    }

    input:focus {
      border-color: #4f46e5;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -12px;
      margin-bottom: 24px;
    }

    .forgot-link {
      font-size: 0.8125rem;
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
      color: #3730a3;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 11px 20px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      color: #ffffff;
      background: #4f46e5;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover {
      background: #4338ca;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
    }

    .btn-primary:active {
      background: #3730a3;
      transform: translateY(1px);
      box-shadow: none;
    }

    .btn-primary:focus-visible {
      outline: 2px solid #4f46e5;
      outline-offset: 2px;
    }

    .signup-row {
      margin-top: 20px;
      text-align: center;
      font-size: 0.875rem;
      color: #6b7280;
    }

    .signup-row a {
      color: #4f46e5;
      font-weight: 500;
      text-decoration: none;
    }

    .signup-row a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Welcome back</h1>
      <p>Sign in to your account to continue.</p>
    </div>

    <form novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <div class="forgot-row">
        <a href="#" class="forgot-link">Forgot your password?</a>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <div class="signup-row">
      Don't have an account? <a href="#">Create one</a>
    </div>
  </div>
</body>
</html>
