<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens (HSL palette) ─────────────────── */
    :root {
      /* Cool-grey scale — slight blue hue for modern/technical feel */
      --grey-50:  hsl(220, 20%, 98%);
      --grey-100: hsl(220, 16%, 94%);
      --grey-200: hsl(220, 13%, 88%);
      --grey-300: hsl(220, 11%, 76%);
      --grey-400: hsl(220, 9%, 58%);
      --grey-500: hsl(220, 9%, 46%);
      --grey-700: hsl(220, 13%, 26%);
      --grey-900: hsl(222, 22%, 14%);

      /* Primary blue — 9-shade scale */
      --blue-50:  hsl(217, 91%, 96%);
      --blue-100: hsl(217, 88%, 90%);
      --blue-500: hsl(217, 91%, 60%);
      --blue-600: hsl(217, 80%, 52%);
      --blue-700: hsl(217, 74%, 42%);

      /* Spacing scale (base-8) */
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-10: 40px;
      --space-12: 48px;

      /* Typography scale */
      --text-sm:   14px;
      --text-base: 16px;
      --text-lg:   18px;
      --text-3xl:  30px;

      /* Elevation: two-part shadow (ambient + direct) */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.05);
    }

    /* ── Page shell ───────────────────────────────────── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--grey-50);
      color: var(--grey-900);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      /* Subtle dot-grid background decoration */
      background-image: radial-gradient(var(--grey-200) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* ── Card ─────────────────────────────────────────── */
    /*
      - max-width constrains the card to its natural size regardless of screen width
      - accent top border adds brand presence without a heavy fill
      - box-shadow instead of a border for elevation (fewer-borders principle)
    */
    .card {
      background: #ffffff;
      width: 100%;
      max-width: 440px;
      border-radius: 12px;
      border-top: 4px solid var(--blue-500);
      box-shadow: var(--shadow-lg);
      padding: var(--space-10) var(--space-10);
    }

    /* ── Header ───────────────────────────────────────── */
    .card-header {
      margin-bottom: var(--space-8);
    }

    /* Wordmark / logo lockup */
    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-8);
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--blue-500);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg { display: block; }

    .brand-name {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--grey-900);
      letter-spacing: -0.01em;
    }

    /*
      Page heading: large + heavy weight for primary visual hierarchy.
      Subheading: secondary color (muted grey) to de-emphasize.
    */
    .card-title {
      font-size: var(--text-3xl);
      font-weight: 700;
      color: var(--grey-900);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: var(--space-2);
    }

    .card-subtitle {
      font-size: var(--text-sm);
      color: var(--grey-500);   /* secondary color — lower contrast, de-emphasized */
      line-height: 1.5;
    }

    /* ── Form ─────────────────────────────────────────── */
    .form { display: flex; flex-direction: column; gap: var(--space-5); }

    /* Each form group: tight label→input spacing (4px), wider group→group spacing (20px) */
    .form-group { display: flex; flex-direction: column; gap: var(--space-1); }

    /*
      Labels: secondary visual hierarchy.
      De-emphasized via font-weight 500 (not bold) and muted grey color.
      The value (input text) is the primary element.
    */
    .form-label {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--grey-700);
      line-height: 1.4;
    }

    /*
      Inputs: clean, sufficient padding for touch targets (44px+ height),
      subtle border (rgba instead of heavy grey) — fewer-borders principle.
      Focus state uses brand color without relying on color alone (ring visible on all backgrounds).
    */
    .form-input {
      width: 100%;
      height: 44px;
      padding: 0 var(--space-4);
      font-family: inherit;
      font-size: var(--text-base);
      font-weight: 400;
      color: var(--grey-900);
      background: #ffffff;
      border: 1.5px solid var(--grey-200);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .form-input::placeholder {
      color: var(--grey-400);  /* tertiary color — very muted */
    }

    .form-input:hover {
      border-color: var(--grey-300);
    }

    .form-input:focus {
      border-color: var(--blue-500);
      box-shadow: 0 0 0 3px var(--blue-50);  /* focus ring via shadow, not border */
    }

    /* ── Password row: label + forgot link ───────────── */
    /*
      'Forgot your password?' is a tertiary action — styled as a muted link,
      not a button, to keep the primary action (Sign In) visually dominant.
    */
    .password-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .forgot-link {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--blue-600);
      text-decoration: none;
      line-height: 1.4;
    }

    .forgot-link:hover {
      color: var(--blue-700);
      text-decoration: underline;
    }

    .forgot-link:focus-visible {
      outline: 2px solid var(--blue-500);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* ── Submit button ────────────────────────────────── */
    /*
      Primary action: solid, high-contrast background.
      Full-width, tall enough for comfortable tap targets (48px).
      Heavy font weight to reinforce prominence.
    */
    .btn-primary {
      display: block;
      width: 100%;
      height: 48px;
      margin-top: var(--space-3);
      padding: 0 var(--space-6);
      font-family: inherit;
      font-size: var(--text-base);
      font-weight: 600;
      color: #ffffff;
      background: var(--blue-500);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      box-shadow: 0 1px 2px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      background: var(--blue-600);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
    }

    .btn-primary:active {
      background: var(--blue-700);
      transform: translateY(1px);
      box-shadow: var(--shadow-sm);
    }

    .btn-primary:focus-visible {
      outline: 3px solid var(--blue-100);
      outline-offset: 2px;
    }

    /* ── Divider ──────────────────────────────────────── */
    /*
      Minimal horizontal rule — lighter than default,
      with text break to avoid a plain full-width line.
    */
    .divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-top: var(--space-2);
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--grey-100);
    }

    .divider-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--grey-400);
      text-transform: uppercase;
      letter-spacing: 0.05em;  /* letter-spacing for all-caps text */
      white-space: nowrap;
    }

    /* ── Sign-up prompt ───────────────────────────────── */
    .signup-prompt {
      text-align: center;
      font-size: var(--text-sm);
      color: var(--grey-500);
    }

    .signup-link {
      font-weight: 600;
      color: var(--blue-600);
      text-decoration: none;
    }

    .signup-link:hover {
      color: var(--blue-700);
      text-decoration: underline;
    }

    .signup-link:focus-visible {
      outline: 2px solid var(--blue-500);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 480px) {
      .card {
        padding: var(--space-8) var(--space-6);
      }
      /* On mobile, reduce the hierarchy gap — large headline shrinks more than body */
      .card-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="card" role="main">

    <!-- Brand lockup -->
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 1L16 5V13L9 17L2 13V5L9 1Z" fill="white" fill-opacity="0.9"/>
        </svg>
      </div>
      <span class="brand-name">Acme</span>
    </div>

    <!-- Heading — primary visual element -->
    <header class="card-header">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-subtitle">Sign in to continue to your account.</p>
    </header>

    <!-- Form -->
    <form class="form" action="#" method="post" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          spellcheck="false"
          required
        />
      </div>

      <!-- Password — label row contains the tertiary 'Forgot' link -->
      <div class="form-group">
        <div class="password-header">
          <label class="form-label" for="password">Password</label>
          <!--
            Tertiary action: link style, de-emphasized — does not compete
            with the primary Sign In button for attention.
          -->
          <a href="#" class="forgot-link">Forgot your password?</a>
        </div>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
      </div>

      <!-- Primary action — solid, high-contrast, full-width -->
      <button class="btn-primary" type="submit">Sign In</button>

    </form>

    <!-- Separator -->
    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <!-- Secondary prompt — de-emphasized, does not compete with primary CTA -->
    <p class="signup-prompt">
      Don't have an account? <a href="#" class="signup-link">Create one</a>
    </p>

  </div>

</body>
</html>
