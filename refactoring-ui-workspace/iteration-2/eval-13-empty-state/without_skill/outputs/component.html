<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recent Transactions – Empty State</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1d23;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }

    /* ── Card Header ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f0f2f5;
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header-icon {
      width: 36px;
      height: 36px;
      background: #eff6ff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-header-icon svg {
      width: 18px;
      height: 18px;
      color: #3b82f6;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      line-height: 1.3;
    }

    .card-subtitle {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 1px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      background: #f3f4f6;
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ── Empty State Body ── */
    .empty-state {
      padding: 48px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .illustration {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      position: relative;
    }

    .illustration::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px dashed #bfdbfe;
    }

    .illustration svg {
      width: 44px;
      height: 44px;
      color: #3b82f6;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .empty-description {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      max-width: 340px;
    }

    /* ── Hint tiles ── */
    .hints {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      width: 100%;
    }

    .hint-tile {
      flex: 1;
      background: #f9fafb;
      border: 1px solid #f0f2f5;
      border-radius: 12px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .hint-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint-icon--send  { background: #fef3c7; }
    .hint-icon--recv  { background: #d1fae5; }
    .hint-icon--auto  { background: #ede9fe; }

    .hint-icon svg {
      width: 16px;
      height: 16px;
    }

    .hint-icon--send  svg { color: #d97706; }
    .hint-icon--recv  svg { color: #059669; }
    .hint-icon--auto  svg { color: #7c3aed; }

    .hint-label {
      font-size: 11px;
      font-weight: 600;
      color: #374151;
      line-height: 1.3;
    }

    /* ── CTA ── */
    .cta-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      width: 100%;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      padding: 11px 24px;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 1px 3px rgba(37, 99, 235, 0.3), 0 4px 12px rgba(37, 99, 235, 0.2);
      letter-spacing: 0.1px;
    }

    .btn-primary:hover {
      background: #1d4ed8;
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.35), 0 6px 18px rgba(37, 99, 235, 0.25);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary svg {
      width: 16px;
      height: 16px;
    }

    .btn-secondary {
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .btn-secondary:hover {
      color: #374151;
      background: #f3f4f6;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 14px 24px;
      border-top: 1px solid #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d1fae5;
    }

    .footer-text {
      font-size: 12px;
      color: #9ca3af;
    }

    .footer-text strong {
      color: #059669;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="card-header-left">
        <div class="card-header-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
          </svg>
        </div>
        <div>
          <div class="card-title">Recent Transactions</div>
          <div class="card-subtitle">Your latest activity</div>
        </div>
      </div>
      <span class="badge">0 items</span>
    </div>

    <!-- Empty State -->
    <div class="empty-state">

      <div class="illustration">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/>
        </svg>
      </div>

      <h2 class="empty-title">No transactions yet</h2>
      <p class="empty-description">
        Once you send, receive, or schedule a payment it will appear here so you can track every move of your money.
      </p>

      <!-- Hint tiles -->
      <div class="hints">

        <div class="hint-tile">
          <div class="hint-icon hint-icon--send">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18"/>
            </svg>
          </div>
          <span class="hint-label">Send Money</span>
        </div>

        <div class="hint-tile">
          <div class="hint-icon hint-icon--recv">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5L12 21m0 0l-7.5-7.5M12 21V3"/>
            </svg>
          </div>
          <span class="hint-label">Request Payment</span>
        </div>

        <div class="hint-tile">
          <div class="hint-icon hint-icon--auto">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <span class="hint-label">Schedule Payment</span>
        </div>

      </div>

      <!-- CTA Buttons -->
      <div class="cta-group">
        <button class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
          </svg>
          Make Your First Transaction
        </button>
        <button class="btn-secondary">Learn how transactions work →</button>
      </div>

    </div>

    <!-- Footer -->
    <div class="card-footer">
      <div class="footer-dot"></div>
      <p class="footer-text">All transactions are <strong>encrypted &amp; secure</strong></p>
    </div>

  </div>

</body>
</html>
